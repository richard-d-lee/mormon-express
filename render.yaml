services:
  - type: web
    name: mormon-express
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mormon-express-db
          property: connectionString

databases:
  - name: mormon-express-db
    databaseName: mormon_express
    user: mormon_express_user
    plan: free
