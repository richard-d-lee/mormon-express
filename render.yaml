services:
  - type: web
    name: lds-bots
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lds-bots-db
          property: connectionString

databases:
  - name: lds-bots-db
    databaseName: lds_bots
    user: lds_bots_user
    plan: free
